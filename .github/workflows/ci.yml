name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default for the whole workflow.
permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    # NOTE: no step-security/harden-runner here — it only supports Linux
    # runners, and this job also runs on macOS and Windows.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run lint

      - name: Run tests
        run: bun test

      - name: Build bundle
        run: bun build src/cli.ts --target=node --outfile=dist/cli.js --minify --banner='#!/usr/bin/env node'

      - name: Smoke test bundle (Unix)
        if: runner.os != 'Windows'
        run: |
          echo '{"model":{"display_name":"gpt-5.5","reasoning":{"effort":"xhigh"}},"context_window":{"current_context_used_percentage":8},"cwd":"."}' | COPILOTLINE_USAGE=0 node dist/cli.js render

      - name: Smoke test bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          '{"model":{"display_name":"gpt-5.5","reasoning":{"effort":"xhigh"}},"context_window":{"current_context_used_percentage":8},"cwd":"."}' | node dist/cli.js render
        env:
          COPILOTLINE_USAGE: "0"
