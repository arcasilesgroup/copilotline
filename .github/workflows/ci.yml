name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run lint

      - name: Run tests
        run: bun test

      - name: Build bundle
        run: bun build src/cli.ts --target=node --outfile=dist/cli.js --minify --banner='#!/usr/bin/env node'

      - name: Smoke test bundle (Unix)
        if: runner.os != 'Windows'
        run: |
          echo '{"model":{"display_name":"gpt-5.5","reasoning":{"effort":"xhigh"}},"context_window":{"current_context_used_percentage":8},"cwd":"."}' | COPILOTLINE_USAGE=0 node dist/cli.js render

      - name: Smoke test bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          '{"model":{"display_name":"gpt-5.5","reasoning":{"effort":"xhigh"}},"context_window":{"current_context_used_percentage":8},"cwd":"."}' | node dist/cli.js render
        env:
          COPILOTLINE_USAGE: "0"
