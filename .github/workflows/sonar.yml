name: SonarCloud

# Static analysis + coverage quality gate via SonarCloud.
#
# Fail-loud by design: the job ALWAYS runs and fails when SonarCloud is not
# working — a missing SONAR_TOKEN or a red quality gate both turn the required
# `SonarCloud` check red, so a broken/unconfigured analysis is never silent.
# Setup: import the repo on sonarcloud.io and add the SONAR_TOKEN repo secret
# (see README / docs/RELEASING.md).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Assert SONAR_TOKEN is configured
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "::error::SONAR_TOKEN is not set — SonarCloud cannot run. Add the repo secret (sonarcloud.io → My Account → Security)."
            exit 1
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so SonarCloud can assign blame / new-code periods.
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Tests with coverage (lcov)
        run: bun test --coverage --coverage-reporter=lcov
      - name: SonarCloud scan + quality gate
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.qualitygate.wait=true
