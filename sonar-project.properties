# SonarCloud configuration for @arcasilesgroup/copilotline.
# Project + organization keys follow SonarCloud's GitHub auto-import default
# (<org>_<repo>); adjust if the imported project uses a different key.
sonar.projectKey=arcasilesgroup_copilotline
sonar.organization=arcasilesgroup

sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.ts

# Coverage produced by `bun test --coverage --coverage-reporter=lcov`.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Tooling, build output, and the vendored framework are not product code.
sonar.exclusions=dist/**,docs/**,.ai-engineering/**,**/*.test.ts
sonar.coverage.exclusions=tests/**,**/*.test.ts,src/cli.ts
